<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOR YOUUU ♡</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Fondo de noche estrellada borrosa -->
    <div class="starry-bg"></div>
    <div class="stars-layer"></div>

    <!-- PANTALLA INICIAL (WELCOME SCREEN) -->
    <div id="welcome-screen" class="screen active">
        <div class="welcome-content">
            <div class="heart-icon">💜</div>
            <h1>FOR YOUUU</h1>
            <p>Tengo algo especial para ti...</p>
            <button id="start-btn" class="glow-button">Abrir regalo ✨</button>
        </div>
    </div>

    <!-- REPRODUCTOR ESTILO SPOTIFY -->
    <div id="player-screen" class="screen">
        <div class="mobile-frame">
            
            <div class="top-bar">
                <span class="icon">⌄</span>
                <span class="playlist-title">Nuestra Playlist</span>
                <span class="icon">•••</span>
            </div>

            <div class="cover-container">
                <img id="album-cover" src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=500&auto=format&fit=crop" alt="Portada de la canción">
            </div>

            <div class="song-header">
                <div class="song-details">
                    <h2 id="song-title">NIGHT DANCER</h2>
                    <p id="artist-name">imase</p>
                </div>
                <button class="heart-btn" id="like-btn">♥</button>
            </div>

            <div class="progress-container">
                <audio id="audio-player" src="cancion1.mp3"></audio>
                <input type="range" id="seek-bar" value="0" max="100">
                <div class="time-labels">
                    <span id="current-time">0:00</span>
                    <span id="duration-time">3:30</span>
                </div>
            </div>

            <div class="player-controls">
                <button class="control-btn sub-btn">🔀</button>
                <button class="control-btn" id="prev-btn">⏮</button>
                <button class="control-btn play-main-btn" id="play-pause-btn">▶</button>
                <button class="control-btn" id="next-song-btn">⏭</button>
                <button class="control-btn sub-btn">🔁</button>
            </div>

            <div class="dedication-card">
                <div class="dedication-header">
                    <span>✦ POR QUÉ TE LA DEDICO</span>
                </div>
                <p id="dedication-text" class="dedication-text">
                    Esta es la razón especial por la que te dedico esta canción.
                </p>
            </div>

            <button id="next-page-btn" class="next-card-btn">Siguiente canción ➔</button>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
