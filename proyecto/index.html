<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Marcelaaaaaa 💜</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fuentes elegantes -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Fondo de estrellas en tonos morados -->
    <div class="stars-container">
        <div id="stars"></div>
        <div id="stars2"></div>
        <div id="stars3"></div>
    </div>

    <!-- Luna Fija con brillo morado/lila -->
    <div class="moon"></div>

    <!-- PÁGINA INICIAL -->
    <div class="container active" id="initial-page">
        <h1>For My Love 💜</h1>
        <p class="subtitle">te hize un detallito ya que estoy aprendiendo a programar jejej :)</p>
        <button id="startButton">Comenzar ✨</button>
    </div>

    <!-- SECCIÓN DE LA CARTA FINAL -->
    <section id="final-card-section" class="final-card container">
        <div class="mensaje" id="mensajeContainer">
            <h2>Para ti, mi amor 💜</h2>
            <p id="textoCarta"></p>
            <!-- Botón de Sorpresas que aparecerá al final -->
            <button id="verSorpresasButton" class="hidden boton-sorpresas">¿Qué eres para mí? 💖</button>
        </div>
    </section>

    <!-- SECCIÓN DE SORPRESAS (CORREGIDA CON .JPG) -->
    <section id="sorpresas-section" class="sorpresas-section container">
        <h2>Lo que veo en ti 😍</h2>
        <div class="sorpresas-grid">
            
            <!-- Sorpresa 1: Fuerte -->
            <div class="sorpresa-item">
                <button class="sorpresa-btn" onclick="mostrarModal('Eres increíblemente FUERTE 💪', 'Eres la persona más resiliente que conozco. Tu fortaleza me inspira cada día.', 'fuerte.jpg')">Fuerte</button>
            </div>
            
            <!-- Sorpresa 2: Inteligente -->
            <div class="sorpresa-item">
                <button class="sorpresa-btn" onclick="mostrarModal('Eres tan INTELIGENTE 🤓☝️', 'Tu mente me deslumbra. Siempre tienes las respuestas perfectas (o los mejores memes).', 'inteligente.jpg')">Inteligente</button>
            </div>
            
            <!-- Sorpresa 3: Hermosa -->
            <div class="sorpresa-item">
                <button class="sorpresa-btn" onclick="mostrarModal('Eres la más HERMOSA 💜', 'Tu belleza interior y exterior son incomparables. Eres perfecta.', 'hermosa.jpg')">Hermosa</button>
            </div>
            
            <!-- Sorpresa 4: Talentosa -->
            <div class="sorpresa-item">
                <button class="sorpresa-btn" onclick="mostrarModal('Eres SÚPER TALENTOSA 🤸‍♀️', 'Tu dedicación en la gimnasia es increíble. ¡Te admiro muchísimo!', 'talentosa.jpg')">Talentosa</button>
            </div>
            
            <!-- Sorpresa 5: Deslumbrante -->
            <div class="sorpresa-item">
                <button class="sorpresa-btn" onclick="mostrarModal('Eres DESLUMBRANTE ✨', 'Tu luz propia ilumina cualquier lugar donde estés. Esos rulos tuyos son únicos y espectaculares.', 'deslumbrante.jpg')">Deslumbrante</button>
            </div>
            
            <!-- Sorpresa 6: Perfecta -->
            <div class="sorpresa-item">
                <button class="sorpresa-btn" onclick="mostrarModal('Eres PERFECTA PARA MÍ 💜', 'No cambiaría absolutamente nada de ti. Eres mi mundo entero.', 'perfecta.jpg')">Perfecta para mí</button>
            </div>

        </div>
    </section>

    <!-- Ventana flotante (Modal) para las Sorpresas -->
    <div id="modalSorpresa" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <h3 id="modalTitle"></h3>
            <img id="modalImage" src="" alt="Sorpresa para Marcela">
            <p id="modalText"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
